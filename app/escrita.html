<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escrita — Alemão Fácil Brasil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .lvl-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border-light);background:transparent;font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s;color:var(--text-primary);font-family:inherit;margin:2px}
    .lvl-btn:hover{border-color:var(--color-primary)}
    .lvl-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .german-sentence{font-size:1.3rem;font-weight:700;text-align:center;padding:28px 20px;background:var(--bg-secondary);border-radius:16px;border:1px solid var(--border-light);margin-bottom:12px;line-height:1.5}
    textarea{width:100%;min-height:90px;padding:14px;border-radius:12px;border:2px solid var(--border-light);background:var(--bg-primary);color:var(--text-primary);font-size:1rem;resize:vertical;box-sizing:border-box;font-family:inherit}
    textarea:focus{outline:none;border-color:var(--color-primary)}
    .translation-box{margin-top:12px;padding:14px;border-radius:12px;background:var(--bg-secondary);border:1px solid var(--border-light);cursor:pointer;user-select:none}
    .translation-box.blurred{filter:blur(6px)}.translation-box.blurred:hover{filter:blur(2px)}
  </style>
</head>
<body>
<div id="app-nav"></div>
<div class="container" style="padding-top:28px;max-width:700px;">
  <h2>✍️ Escrita</h2>
  <p class="muted">Pratique escrevendo frases em alemão. <strong id="pool-count">...</strong> frases disponíveis.</p>

  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="level-filters">
    <button class="lvl-btn" data-l="random">🎲 Aleatório</button>
    <button class="lvl-btn active" data-l="A1">A1</button><button class="lvl-btn" data-l="A2">A2</button>
    <button class="lvl-btn" data-l="B1">B1</button><button class="lvl-btn" data-l="B2">B2</button>
    <button class="lvl-btn" data-l="C1">C1</button><button class="lvl-btn" data-l="C2">C2</button>
  </div>

  <div class="card" id="practice-area" style="display:none">
    <div class="german-sentence" id="german-text">...</div>
    <textarea id="user-input" placeholder="Digite a frase em alemão aqui..."></textarea>
    <div class="translation-box blurred" id="translation-box" title="Clique para revelar">
      <div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:4px">👁️ Clique para ver tradução</div>
      <div id="translation-text"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-outline" id="check-btn" style="flex:1">✅ Verificar</button>
      <button class="btn btn-primary" id="next-btn" style="flex:1">▶ Próxima</button>
    </div>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/xp.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/data.js"></script>
<script>
Auth.requireLogin();renderNav("escrita");

const R2="https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/";
const st={level:"A1",pool:[],sentence:null};

async function buildPool(){
  const pool=[],lvs=st.level==="random"?["A1","A2","B1","B2","C1","C2"]:[st.level];
  for(const lv of lvs){
    try{
      let r=await fetch(R2+"data/escrita/"+lv+".json").catch(()=>fetch("../data/escrita/"+lv+".json"));
      for(const s of await r.json())pool.push({german:s.german,portuguese:s.portuguese||I18n.field(s,'portuguese'),level:lv});
    }catch(e){}
  }
  // Adiciona girias e profissoes
  try{let r=await fetch(R2+"data/girias.json").catch(()=>fetch("../data/girias.json"));for(const e of(await r.json()).expressions||[]){if(lvs.includes(e.level))pool.push({german:e.german,portuguese:e.portuguese,level:e.level})}}catch(e){}
  try{let r=await fetch(R2+"data/profissoes.json").catch(()=>fetch("../data/profissoes.json"));for(const e of(await r.json()).expressions||[]){for(const ph of e.phrases||[]){if(lvs.includes(ph.level))pool.push({german:ph.de,portuguese:ph.pt,level:ph.level})}}catch(e){}

  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  st.pool=pool;
  document.getElementById("pool-count").textContent=pool.length.toLocaleString();
  if(pool.length){document.getElementById("practice-area").style.display="";show()}else{document.getElementById("german-text").textContent="Nenhuma frase. Tente outro nível."}
}

function show(){
  const s=st.pool[Math.floor(Math.random()*st.pool.length)];st.sentence=s;
  document.getElementById("german-text").textContent=s.german;
  document.getElementById("user-input").value="";document.getElementById("user-input").style.borderColor="";
  document.getElementById("translation-text").textContent=s.portuguese;
  document.getElementById("translation-box").classList.add("blurred");
  document.getElementById("check-btn").textContent="✅ Verificar";document.getElementById("check-btn").disabled=false;
}

document.getElementById("check-btn").addEventListener("click",()=>{
  const s=st.sentence;if(!s)return;
  const n=t=>t.replace(/\s+/g," ").trim().toLowerCase();
  if(n(document.getElementById("user-input").value)===n(s.german)){
    document.getElementById("check-btn").textContent="✅ Correto!";document.getElementById("check-btn").disabled=true;
    document.getElementById("user-input").style.borderColor="#4CAF50";
    document.getElementById("translation-box").classList.remove("blurred");
    try{Progress.complete("escrita-"+Date.now(),5)}catch(e){}
  }else{document.getElementById("check-btn").textContent="❌ Tente de novo";document.getElementById("user-input").style.borderColor="#f44";setTimeout(()=>document.getElementById("user-input").style.borderColor="",1500)}
});

document.getElementById("next-btn").addEventListener("click",show);
document.getElementById("translation-box").addEventListener("click",function(){this.classList.toggle("blurred")});
document.getElementById("level-filters").addEventListener("click",e=>{if(e.target.classList.contains("lvl-btn")){document.querySelectorAll("#level-filters .lvl-btn").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");st.level=e.target.dataset.l;buildPool()}});

buildPool();
</script>
</body>
</html>
