<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrita — Alemão Fácil Brasil</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
.lvl-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border-light);background:transparent;font-weight:600;font-size:.82rem;cursor:pointer;color:var(--text-primary);font-family:inherit;margin:2px}
.lvl-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.german-sentence{font-size:1.3rem;font-weight:700;text-align:center;padding:28px 20px;background:var(--bg-secondary);border-radius:16px;border:1px solid var(--border-light);margin-bottom:12px}
textarea{width:100%;min-height:90px;padding:14px;border-radius:12px;border:2px solid var(--border-light);background:var(--bg-primary);color:var(--text-primary);font-size:1rem;resize:vertical;box-sizing:border-box;font-family:inherit}
textarea:focus{outline:none;border-color:var(--color-primary)}
.trans-box{margin-top:12px;padding:14px;border-radius:12px;background:var(--bg-secondary);border:1px solid var(--border-light);cursor:pointer;user-select:none}
.trans-box.blurred{filter:blur(6px)}.trans-box.blurred:hover{filter:blur(2px)}
</style></head>
<body>
<div id="app-nav"></div>
<div class="container" style="padding-top:28px;max-width:700px">
<h2>✍️ Escrita</h2>
<p><strong id="count">...</strong> frases disponiveis</p>
<div id="filters" style="margin:10px 0">
<button class="lvl-btn" data-l="random">🎲 Aleatorio</button>
<button class="lvl-btn active" data-l="A1">A1</button><button class="lvl-btn" data-l="A2">A2</button>
<button class="lvl-btn" data-l="B1">B1</button><button class="lvl-btn" data-l="B2">B2</button>
<button class="lvl-btn" data-l="C1">C1</button><button class="lvl-btn" data-l="C2">C2</button>
</div>
<div class="card" id="card" style="display:none">
<div class="german-sentence">
<span id="german"></span>
<span id="playbtn" style="cursor:pointer;opacity:.5;font-size:1rem;margin-left:8px;display:none" title="Ouvir">🔊</span>
</div>
<textarea id="input" placeholder="Digite a frase em alemao aqui..."></textarea>
<div class="trans-box blurred" id="trans" title="Clique para revelar">
<div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:4px">Clique para ver traducao</div>
<div id="transtext"></div>
</div>
<div style="display:flex;gap:10px;margin-top:16px">
<button class="btn btn-outline" id="check" style="flex:1">✅ Verificar</button>
<button class="btn btn-primary" id="next" style="flex:1">▶ Proxima</button>
</div>
</div>
</div>
<script src="../assets/js/theme.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/xp.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
Auth.requireLogin();
renderNav("escrita");
var pool=[];
var level="A1";
var current=null;

function loadData(){
  pool=[];
  var lvs=level==="random"?["A1","A2","B1","B2","C1","C2"]:[level];
  // Carrega escrita nativa
  var promises=[];
  for(var i=0;i<lvs.length;i++){
    (function(lv){
      promises.push(fetch("../data/escrita/"+lv+".json").then(function(r){return r.json()}).then(function(data){
        for(var j=0;j<data.length;j++){
          var s=data[j];
          pool.push({german:s.german,portuguese:s.portuguese,audio:null});
        }
      }).catch(function(){}));
    })(lvs[i]);
  }
  // Girias
  promises.push(fetch("../data/girias.json").then(function(r){return r.json()}).then(function(g){
    var exps=g.expressions||[];
    for(var i=0;i<exps.length;i++){
      var e=exps[i];
      if(lvs.indexOf(e.level)>=0)pool.push({german:e.german,portuguese:e.portuguese,audio:e.audio_url});
    }
  }).catch(function(){}));
  // Profissoes
  promises.push(fetch("../data/profissoes.json").then(function(r){return r.json()}).then(function(p){
    var exps=p.expressions||[];
    for(var i=0;i<exps.length;i++){
      var phs=exps[i].phrases||[];
      for(var j=0;j<phs.length;j++){
        var ph=phs[j];
        if(lvs.indexOf(ph.level)>=0)pool.push({german:ph.de,portuguese:ph.pt,audio:ph.audio_url});
      }
    }
  }).catch(function(){}));

  Promise.all(promises).then(function(){
    for(var i=pool.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
    }
    document.getElementById("count").textContent=pool.length;
    if(pool.length>0){document.getElementById("card").style.display="";nextSentence();}
  });
}

function nextSentence(){
  if(pool.length===0)return;
  current=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById("german").textContent=current.german;
  var pb=document.getElementById("playbtn");
  if(current.audio){pb.style.display="inline";pb.onclick=function(){var a=new Audio();var u=current.audio;if(u.indexOf("http")!==0)u="https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/"+u;a.src=u;a.play();};}else{pb.style.display="none";}
  document.getElementById("input").value="";
  document.getElementById("input").style.borderColor="";
  document.getElementById("transtext").textContent=current.portuguese||"";
  document.getElementById("trans").classList.add("blurred");
  document.getElementById("check").textContent="✅ Verificar";
  document.getElementById("check").disabled=false;
}

document.getElementById("check").onclick=function(){
  if(!current)return;
  var written=document.getElementById("input").value.trim();
  var target=current.german.trim();
  var n=function(t){return t.replace(/\s+/g," ").trim().toLowerCase();};
  if(n(written)===n(target)){
    document.getElementById("check").textContent="✅ Correto!";
    document.getElementById("check").disabled=true;
    document.getElementById("input").style.borderColor="#4CAF50";
    document.getElementById("trans").classList.remove("blurred");
    try{Progress.complete("escrita-"+Date.now(),5)}catch(e){}
  }else{
    document.getElementById("check").textContent="❌ Tente de novo";
    document.getElementById("input").style.borderColor="#f44";
    setTimeout(function(){document.getElementById("input").style.borderColor="";},1500);
  }
};

document.getElementById("next").onclick=nextSentence;
document.getElementById("trans").onclick=function(){this.classList.toggle("blurred");};

document.getElementById("filters").onclick=function(e){
  if(e.target.classList.contains("lvl-btn")){
    var btns=document.querySelectorAll("#filters .lvl-btn");
    for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
    e.target.classList.add("active");
    level=e.target.dataset.l;
    loadData();
  }
};

loadData();
</script>
</body></html>
