<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Alemão Fácil Brasil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div id="app-nav"></div>
  <div class="container" style="padding-top:28px; max-width:640px;">
    <h2 class="mt-0">Meu perfil</h2>

    <div class="card">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="name">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" disabled>
      </div>
      <button class="btn btn-primary" id="save-name">Salvar</button>
    </div>

    <h3 class="section-title">Estatísticas</h3>
    <div class="grid grid-4">
      <div class="card center"><b id="stat-xp" style="font-size:1.4rem;"></b><p class="muted" style="margin:4px 0 0;">XP total</p></div>
      <div class="card center"><b id="stat-level" style="font-size:1.4rem;"></b><p class="muted" style="margin:4px 0 0;">Nível</p></div>
      <div class="card center"><b id="stat-streak" style="font-size:1.4rem;"></b><p class="muted" style="margin:4px 0 0;">Streak</p></div>
      <div class="card center"><b id="stat-completed" style="font-size:1.4rem;"></b><p class="muted" style="margin:4px 0 0;">Concluídos</p></div>
    </div>

    <h3 class="section-title">Tema</h3>
    <div class="card flex-between">
      <div>
        <b id="theme-label"></b>
        <p class="muted" style="margin:2px 0 0; font-size:.85rem;">Troque a paleta de cores e o companheiro do app.</p>
      </div>
      <button class="btn btn-outline" id="theme-toggle">Trocar tema</button>
    </div>

    <h3 class="section-title" id="section-language">Idioma</h3>
    <div class="card flex-between">
      <div>
        <b id="language-label">🇧🇷 Português</b>
        <p class="muted" style="margin:2px 0 0; font-size:.85rem;">Altere o idioma da interface do app.</p>
      </div>
      <button class="btn btn-outline" id="language-toggle">Trocar idioma</button>
    </div>

    <h3 class="section-title">Conta</h3>
    <div class="card">
      <button class="btn btn-ghost" id="logout-btn">Sair da conta</button>
    </div>
  </div>

  <!-- Modal de seleção de idioma -->
  <div id="lang-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:999; align-items:center; justify-content:center;">
    <div class="card" style="max-width:400px; width:90%; padding:24px;">
      <h2 class="mt-0" id="modal-lang-title">Selecionar Idioma</h2>
      <p class="muted" id="modal-lang-desc">Selecione o idioma do aplicativo</p>
      <div id="lang-list" style="display:flex; flex-direction:column; gap:8px; margin-top:16px;"></div>
      <button class="btn btn-ghost btn-block" id="modal-close" style="margin-top:12px;">Cancelar</button>
    </div>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/xp.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>
    Auth.requireLogin();
    renderNav("perfil");

    const user = Auth.currentUser();
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;

    document.getElementById("save-name").addEventListener("click", () => {
      const newName = document.getElementById("name").value.trim();
      if (newName) {
        Auth.updateCurrentUser({ name: newName });
        renderNav("perfil");
        alert("Nome atualizado!");
      }
    });

    const progress = Progress.load();

    // ── Idioma ──
    function updateLangLabel() {
      const lang = I18n.getCurrentLang();
      document.getElementById("language-label").textContent = `${lang.flag} ${lang.name}`;
    }
    updateLangLabel();

    document.getElementById("language-toggle").addEventListener("click", () => {
      const modal = document.getElementById("lang-modal");
      const list = document.getElementById("lang-list");
      const current = I18n.getCurrent();
      list.innerHTML = I18n.getAvailable().map(l => `
        <div class="card card-sm" style="cursor:pointer; display:flex; align-items:center; gap:12px; ${l.code === current ? 'border:2px solid var(--color-primary);' : ''}"
             data-code="${l.code}">
          <span style="font-size:1.5rem;">${l.flag}</span>
          <span style="flex:1; font-weight:${l.code === current ? '700' : '400'};">${l.name}</span>
          ${l.code === current ? '<span class="badge">✓</span>' : ''}
        </div>
      `).join("");
      modal.style.display = "flex";
    });

    document.getElementById("lang-list").addEventListener("click", (e) => {
      const card = e.target.closest("[data-code]");
      if (!card) return;
      const code = card.dataset.code;
      if (code !== I18n.getCurrent()) {
        I18n.setLanguage(code);
      }
    });

    document.getElementById("modal-close").addEventListener("click", () => {
      document.getElementById("lang-modal").style.display = "none";
    });
    document.getElementById("lang-modal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById("lang-modal").style.display = "none";
      }
    });
    const levelCode = XPSystem.getCurrentLevel(progress.xp);
    document.getElementById("stat-xp").textContent = progress.xp;
    document.getElementById("stat-level").textContent = `${XP_LEVELS[levelCode].icon} ${levelCode}`;
    document.getElementById("stat-streak").textContent = progress.streak || 0;
    document.getElementById("stat-completed").textContent = progress.completed.length;

    function updateThemeLabel() {
      document.getElementById("theme-label").textContent = Theme.label();
    }
    updateThemeLabel();

    document.getElementById("theme-toggle").addEventListener("click", () => {
      Theme.toggle();
      updateThemeLabel();
      renderNav("perfil");
    });

    document.getElementById("logout-btn").addEventListener("click", () => Auth.logout());
  </script>
</body>
</html>
