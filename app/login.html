<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Alemão Fácil Brasil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="navbar">
    <a class="brand" href="../index.html">🇩🇪 Alemão Fácil Brasil</a>
    <nav></nav>
    <div class="nav-right"><a class="btn btn-outline btn-sm" href="cadastro.html">Criar conta</a></div>
  </header>

  <div class="card form-card">
    <h2 class="center">Entrar</h2>
    <div class="form-error" id="err"></div>
    <form id="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Entrar</button>
    </form>
    <p class="form-footer">Ainda não tem conta? <a href="cadastro.html"><b>Criar conta grátis</b></a></p>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn();

    const form = document.getElementById("login-form");
    const errBox = document.getElementById("err");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errBox.classList.remove("show");
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const result = await Auth.login({ email, password });
      if (!result.ok) {
        errBox.textContent = result.error;
        errBox.classList.add("show");
        return;
      }
      window.location.href = "/app/dashboard.html";
    });
  </script>
</body>
</html>
