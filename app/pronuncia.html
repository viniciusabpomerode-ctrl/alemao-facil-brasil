<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronúncia — Alemão Fácil Brasil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .lvl-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border-light);background:transparent;font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s;color:var(--text-primary);font-family:inherit;margin:2px}
    .lvl-btn:hover{border-color:var(--color-primary)}.lvl-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .german-sentence{font-size:1.3rem;font-weight:700;text-align:center;padding:28px 20px;background:var(--bg-secondary);border-radius:16px;border:1px solid var(--border-light);margin-bottom:8px;line-height:1.5}
    .source-tag{font-size:.7rem;background:var(--brand-light);color:var(--brand);padding:2px 8px;border-radius:10px;font-weight:600}
    .btn-rec{background:#f44336;color:#fff;border:none;padding:14px 28px;border-radius:14px;font-weight:700;cursor:pointer;font-size:1rem;transition:.2s;display:block;width:100%;margin:12px 0;font-family:inherit}
    .btn-rec:hover{opacity:.9}.btn-rec.recording{animation:pulse-rec .8s infinite alternate}
    @keyframes pulse-rec{from{box-shadow:0 0 8px #f44336}to{box-shadow:0 0 20px #f44336}}
    .rec-panel{margin-top:12px;padding:16px;border-radius:12px;background:var(--bg-secondary);border:1px solid var(--border-light);display:none}
    .rec-panel.show{display:block}
    .rec-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:6px 0;background:var(--bg-secondary);border-radius:10px;border:1px solid var(--border-light);gap:8px}
    .rec-item .info{flex:1;min-width:0}.rec-item .text{font-weight:600;font-size:.85rem}.rec-item .date{font-size:.72rem;color:var(--text-secondary)}
    .empty-state{text-align:center;padding:40px;color:var(--text-secondary)}
    .btn-play-orig{background:var(--color-primary);color:#fff;border:none;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit}
  </style>
</head>
<body>
<div id="app-nav"></div>
<div class="container" style="padding-top:28px;max-width:700px;">
  <h2>🎤 Pronúncia</h2>
  <p class="muted">Ouça o original, grave sua voz e compare. <strong id="pool-count">...</strong> frases.</p>

  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="level-filters">
    <button class="lvl-btn" data-l="random">🎲 Aleatório</button>
    <button class="lvl-btn active" data-l="A1">A1</button><button class="lvl-btn" data-l="A2">A2</button>
    <button class="lvl-btn" data-l="B1">B1</button><button class="lvl-btn" data-l="B2">B2</button>
    <button class="lvl-btn" data-l="C1">C1</button><button class="lvl-btn" data-l="C2">C2</button>
  </div>

  <div class="card" id="practice-area" style="display:none">
    <div class="german-sentence">
      <span id="german-text"></span>
      <span class="source-tag" id="source-tag"></span>
    </div>
    <div style="text-align:center;color:var(--text-secondary);font-size:.9rem" id="translation-hint"></div>

    <button class="btn-rec" id="rec-btn">🎤 Gravar minha pronúncia</button>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" id="play-orig-btn" style="flex:1">🔊 Ouvir original</button>
      <button class="btn btn-primary" id="next-btn" style="flex:1">▶ Próxima</button>
    </div>

    <div class="rec-panel" id="rec-panel">
      <p style="font-weight:600;margin:0 0 8px">🎧 Sua gravação:</p>
      <audio id="rec-playback" controls style="width:100%;margin-bottom:8px;"></audio>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" id="rec-save">💾 Salvar</button>
        <button class="btn btn-sm" id="rec-discard" style="color:#f44">🗑️ Descartar</button>
      </div>
    </div>
  </div>

  <div style="margin-top:30px">
    <h3>🎙️ Minhas Gravações</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="rec-filters">
      <button class="lvl-btn active" data-rt="all">📅 Tudo</button>
      <button class="lvl-btn" data-rt="today">☀️ Hoje</button>
      <button class="lvl-btn" data-rt="week">📆 7 dias</button>
      <button class="lvl-btn" data-rt="month">🗓️ 30 dias</button>
    </div>
    <div id="recordings-list"><div class="empty-state">Nenhuma gravação ainda</div></div>
  </div>
</div>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/saved_r2.js"></script>
<script>
Auth.requireLogin();renderNav("pronuncia");

const st={level:"A1",pool:[],sentence:null};
let recFilter="all",mediaRecorder=null,recordedBlob=null;
const origAudio=new Audio();

// IndexedDB
function openDB(){return new Promise((r,rej)=>{const req=indexedDB.open("afb_pronuncia",1);req.onupgradeneeded=e=>e.target.result.createObjectStore("recs",{keyPath:"id"});req.onsuccess=()=>r(req.result);req.onerror=rej})}
async function putRec(r){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction("recs","readwrite");tx.objectStore("recs").put(r);tx.oncomplete=()=>res();tx.onerror=rej})}
async function getAllRecs(){const db=await openDB();return new Promise((r,rej)=>{const tx=db.transaction("recs","readonly");const req=tx.objectStore("recs").getAll();req.onsuccess=()=>r(req.result);req.onerror=rej})}
async function delRec(id){const db=await openDB();return new Promise((r,rej)=>{const tx=db.transaction("recs","readwrite");tx.objectStore("recs").delete(id);tx.oncomplete=()=>r();tx.onerror=rej})}

async function buildPool(){
  const pool=[],lvs=st.level==="random"?["A1","A2","B1","B2","C1","C2"]:[st.level];
  const R2="https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/";
  
  // Dialogos + Verbos (via AFBData)
  for(const lv of lvs){
    try{
      const d=await AFBData.nivel(lv);
      for(const th of d.dialog_themes||[]){for(const dg of th.dialogs||[]){for(const s of dg.sentences||[]){if(s.audio_url)pool.push({german:s.german_text,portuguese:s.portuguese_translation,level:lv,type:"dialogo",audio:s.audio_url})}}}
      const verbs=await AFBData.verbos(lv);
      for(const v of verbs){for(const ex of v.examples||[]){
        // Audio do verbo é da conjugação, não da frase exemplo
        if(ex.audio_url&&ex.conjugated_verb)pool.push({german:ex.conjugated_verb.replace(/\s*\(.*?\)\s*/g,''),portuguese:(ex.pronoun||"")+" - "+v.base_verb,level:lv,type:"verbo",audio:ex.audio_url});
        // Frase completa (sem audio individual, bom pra contexto)
        const sg=ex.example_sentence_german;if(sg)pool.push({german:sg,portuguese:ex.example_sentence_portuguese||"",level:lv,type:"frase",audio:null});
      }}
    }catch(e){}
  }
  // Girias
  try{let r=await fetch("../data/girias.json");if(!r.ok)r=await fetch(R2+"data/girias.json");if(r.ok){const g=await r.json();for(const e of g.expressions||[]){if(lvs.includes(e.level)&&e.audio_url)pool.push({german:e.german,portuguese:e.portuguese,level:e.level,type:"giria",audio:e.audio_url})}}}catch(e){}
  // Profissoes
  try{let r=await fetch("../data/profissoes.json");if(!r.ok)r=await fetch(R2+"data/profissoes.json");if(r.ok){const p=await r.json();for(const e of p.expressions||[]){for(const ph of e.phrases||[]){if(lvs.includes(ph.level))pool.push({german:ph.de,portuguese:ph.pt,level:ph.level,type:"profissao",audio:ph.audio_url})}}}}catch(e){}

  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  st.pool=pool;
  document.getElementById("pool-count").textContent=pool.length.toLocaleString();
  if(pool.length){document.getElementById("practice-area").style.display="";show()}
}

function show(){
  const withAudio=st.pool.filter(p=>p.audio);
  if(!withAudio.length){document.getElementById("german-text").textContent="Nenhuma frase com áudio neste nível.";return}
  const s=withAudio[Math.floor(Math.random()*withAudio.length)];
  st.sentence=s;
  document.getElementById("german-text").textContent=s.german;
  document.getElementById("source-tag").textContent=s.type==="verbo"?"🔤 "+s.portuguese:s.type;
  document.getElementById("translation-hint").textContent=s.type==="verbo"?"":s.portuguese;
  document.getElementById("rec-panel").classList.remove("show");recordedBlob=null;
  document.getElementById("rec-btn").textContent="🎤 Gravar minha pronúncia";
  document.getElementById("rec-btn").classList.remove("recording");
}

// Play original — Supabase + R2 em paralelo (quem responder primeiro toca)
document.getElementById("play-orig-btn").addEventListener("click",()=>{
  const s=st.sentence;if(!s||!s.audio)return;
  const R2="https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/";
  const r2url=s.audio.startsWith("http")?s.audio:R2+s.audio;
  let played=false;
  
  // Supabase (com signed URL)
  if(typeof AFBData!=="undefined"&&AFBData.signedAudioUrl){
    AFBData.signedAudioUrl(s.audio).then(url=>{
      if(url&&!played){origAudio.src=url;origAudio.play().catch(()=>{});played=true}
    }).catch(()=>{});
  }
  // R2 fallback (dispara em paralelo)
  setTimeout(()=>{
    if(!played){origAudio.src=r2url;origAudio.play().catch(()=>{})}
  },600);
});

// Record
document.getElementById("rec-btn").addEventListener("click",async()=>{
  if(mediaRecorder&&mediaRecorder.state==="recording"){mediaRecorder.stop();return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks=[];mediaRecorder=new MediaRecorder(stream,{mimeType:"audio/webm"});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      recordedBlob=new Blob(chunks,{type:"audio/webm"});
      document.getElementById("rec-playback").src=URL.createObjectURL(recordedBlob);
      document.getElementById("rec-panel").classList.add("show");
    };
    mediaRecorder.start();
    document.getElementById("rec-btn").textContent="⏹ Parar gravação";
    document.getElementById("rec-btn").classList.add("recording");
  }catch(e){alert("Permita o microfone!")}
});

// Próxima frase
document.getElementById("next-btn").addEventListener("click",show);

// Save
document.getElementById("rec-save").addEventListener("click",async()=>{
  if(!recordedBlob||!st.sentence)return;
  const id="pron_"+Date.now(),reader=new FileReader();
  reader.onload=async()=>{
    await putRec({id,text:st.sentence.german,translation:st.sentence.portuguese,ts:Date.now(),saved:true,base64:reader.result.split(",")[1]});
    await SavedItems.add({type:"recording",id,title:st.sentence.german.substring(0,60),nivel:st.sentence.level});
    document.getElementById("rec-panel").classList.remove("show");renderRecs();
  };
  reader.readAsDataURL(recordedBlob);
});

// Discard
document.getElementById("rec-discard").addEventListener("click",()=>{recordedBlob=null;document.getElementById("rec-panel").classList.remove("show")});

// Auto-save unsaved on leave
window.addEventListener("beforeunload",()=>{if(recordedBlob&&st.sentence){const id="pron_"+Date.now(),reader=new FileReader();reader.onload=()=>putRec({id,text:st.sentence.german,translation:st.sentence.portuguese,ts:Date.now(),saved:false,base64:reader.result.split(",")[1]});reader.readAsDataURL(recordedBlob)}});

// Render recordings
async function renderRecs(){
  try{
    const db=await openDB();
    const all=await new Promise((r,rej)=>{const tx=db.transaction("recs","readonly");const req=tx.objectStore("recs").getAll();req.onsuccess=()=>r(req.result);req.onerror=rej});
    
    // Clean old unsaved (>24h)
    const now=Date.now();
    for(const rec of all){if(now-rec.ts>86400000&&!rec.saved){try{const tx2=db.transaction("recs","readwrite");tx2.objectStore("recs").delete(rec.id)}catch(e){}}}
    
    let recs=all.filter(r=>now-r.ts<=86400000||r.saved);
    recs.sort((a,b)=>b.ts-a.ts);
    if(recFilter!=="all"){recs=recs.filter(r=>{if(recFilter==="today")return now-r.ts<86400000;if(recFilter==="week")return now-r.ts<7*86400000;if(recFilter==="month")return now-r.ts<30*86400000;return true})}

    const el=document.getElementById("recordings-list");
    if(!recs.length){el.innerHTML='<div class="empty-state">Nenhuma gravação</div>';return}
    el.innerHTML=recs.map(r=>`<div class="rec-item"><div class="info"><div class="text">${(r.text||"").substring(0,70)}</div><div class="date">${new Date(r.ts).toLocaleString("pt-BR")} ${r.saved?"💾":"⏳24h"}</div></div><div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="playRec('${r.id}')">▶</button><button class="btn btn-sm" style="color:#f44" onclick="delRec('${r.id}');renderRecs()">🗑️</button></div></div>`).join("");
  }catch(e){document.getElementById("recordings-list").innerHTML='<div class="empty-state">Erro ao carregar</div>'}
}

async function playRec(id){const recs=await getAllRecs();const r=recs.find(x=>x.id===id);if(!r||!r.base64)return;const b=await fetch("data:audio/webm;base64,"+r.base64).then(x=>x.blob());document.getElementById("rec-playback").src=URL.createObjectURL(b);document.getElementById("rec-panel").classList.add("show")}

document.getElementById("level-filters").addEventListener("click",e=>{if(e.target.classList.contains("lvl-btn")){document.querySelectorAll("#level-filters .lvl-btn").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");st.level=e.target.dataset.l;buildPool()}});
document.getElementById("rec-filters").addEventListener("click",e=>{if(e.target.classList.contains("lvl-btn")){document.querySelectorAll("#rec-filters .lvl-btn").forEach(b=>b.classList.remove("active"));e.target.classList.add("active");recFilter=e.target.dataset.rt;renderRecs()}});

buildPool();renderRecs();
</script>
</body>
</html>
