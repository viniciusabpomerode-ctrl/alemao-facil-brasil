<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronúncia — Alemão Fácil Brasil</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
.lvl-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border-light);background:transparent;font-weight:600;font-size:.82rem;cursor:pointer;color:var(--text-primary);font-family:inherit;margin:2px}
.lvl-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.card{padding:20px;text-align:center}
.german{font-size:1.4rem;font-weight:700;margin:16px 0}
.hint{color:var(--text-secondary);font-size:.9rem;margin:8px 0}
.tag{font-size:.7rem;background:var(--brand-light);color:var(--brand);padding:2px 8px;border-radius:10px}
</style>
</head>
<body>
<div id="app-nav"></div>
<div class="container" style="padding-top:28px;max-width:700px">
<h2>🎤 Pronúncia</h2>
<p><strong id="pool-count">...</strong> frases com áudio</p>
<div id="filters" style="margin:10px 0">
<button class="lvl-btn active" data-l="all">Todos</button>
<button class="lvl-btn" data-l="A1">A1</button>
<button class="lvl-btn" data-l="A2">A2</button>
<button class="lvl-btn" data-l="B1">B1</button>
<button class="lvl-btn" data-l="B2">B2</button>
<button class="lvl-btn" data-l="C1">C1</button>
<button class="lvl-btn" data-l="C2">C2</button>
</div>
<div class="card" id="card" style="display:none">
<div class="german" id="german"></div>
<div class="tag" id="tag"></div>
<div class="hint" id="hint"></div>
<button class="btn btn-outline" id="play" style="margin:12px">🔊 Ouvir</button>
<button class="btn btn-primary" id="next">▶ Próxima</button>
</div>
</div>
<script src="../assets/js/theme.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/nav.js"></script>
<script>
Auth.requireLogin();
renderNav("pronuncia");

var R2 = "https://pub-d856fe7eb96043c3a93a4d72cd8317cc.r2.dev/";
var pool = [];
var level = "all";
var current = null;
var audio = new Audio();

async function load() {
  pool = [];
  var lvs = level === "all" ? ["A1","A2","B1","B2","C1","C2"] : [level];
  
  var r1 = await fetch("../data/girias.json");
  if (r1.ok) {
    var g = await r1.json();
    var exps = g.expressions || [];
    for (var i = 0; i < exps.length; i++) {
      var e = exps[i];
      if (lvs.indexOf(e.level) >= 0) {
        pool.push({german: e.german, portuguese: e.portuguese, type: "giria", audio: e.audio_url});
      }
    }
  }
  
  var r2 = await fetch("../data/profissoes.json");
  if (r2.ok) {
    var p = await r2.json();
    var exps2 = p.expressions || [];
    for (var i = 0; i < exps2.length; i++) {
      var e = exps2[i];
      var phrases = e.phrases || [];
      for (var j = 0; j < phrases.length; j++) {
        var ph = phrases[j];
        if (lvs.indexOf(ph.level) >= 0) {
          pool.push({german: ph.de, portuguese: ph.pt, type: "profissao", audio: ph.audio_url});
        }
      }
    }
  }
  
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i];
    pool[i] = pool[j];
    pool[j] = tmp;
  }
  
  document.getElementById("pool-count").textContent = pool.length;
  if (pool.length) {
    document.getElementById("card").style.display = "";
    next();
  }
}

function next() {
  current = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("german").textContent = current.german;
  document.getElementById("tag").textContent = current.type;
  document.getElementById("hint").textContent = current.portuguese || "";
}

document.getElementById("play").addEventListener("click", function() {
  if (!current || !current.audio) return;
  var url = current.audio.indexOf("http") === 0 ? current.audio : R2 + current.audio;
  audio.src = url;
  audio.play();
});

document.getElementById("next").addEventListener("click", next);

document.getElementById("filters").addEventListener("click", function(e) {
  if (e.target.classList.contains("lvl-btn")) {
    var btns = document.querySelectorAll("#filters .lvl-btn");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    e.target.classList.add("active");
    level = e.target.dataset.l;
    load();
  }
});

load();
</script>
</body>
</html>
